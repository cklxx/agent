<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Agent Interface</title>
    <style>
        body { font-family: sans-serif; margin: 20px; background-color: #f4f4f4; color: #333; }
        .container { background-color: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        h1 { color: #333; }
        textarea { width: 98%; padding: 10px; margin-bottom: 10px; border-radius: 4px; border: 1px solid #ddd; font-size: 16px;}
        button { padding: 10px 20px; background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px;}
        button:hover { background-color: #0056b3; }
        #response { margin-top: 20px; }
        #response h2 { color: #333; }
        #answer { background-color: #e9ecef; padding: 10px; border-radius: 4px; margin-bottom:10px; }
        #steps { background-color: #f8f9fa; padding: 10px; border-radius: 4px; white-space: pre-wrap; font-family: monospace; font-size: 12px; max-height: 400px; overflow-y: auto; border: 1px solid #eee;}
        .loader {
            border: 4px solid #f3f3f3; /* Light grey */
            border-top: 4px solid #3498db; /* Blue */
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: none; /* Hidden by default */
            margin-left: 10px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Ask the Agent</h1>
        <textarea id="question" rows="3" placeholder="Enter your question here..."></textarea>
        <button onclick="invokeAgent()">Submit</button>
        <div class="loader" id="loader"></div>

        <div id="response">
            <h2>Agent's Answer:</h2>
            <div id="answer">The agent's response will appear here.</div>

            <h2>Invocation Steps:</h2>
            <div id="steps">The agent's operational steps will appear here.</div>
        </div>
    </div>

    <script>
        async function invokeAgent() {
            const question = document.getElementById('question').value;
            const answerDiv = document.getElementById('answer');
            const stepsDiv = document.getElementById('steps');
            const loader = document.getElementById('loader');

            if (!question.trim()) {
                alert("Please enter a question.");
                return;
            }

            answerDiv.textContent = 'Processing...';
            stepsDiv.textContent = '';
            loader.style.display = 'inline-block'; // Show loader

            try {
                const response = await fetch('/invoke_agent', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ question: question }),
                });

                loader.style.display = 'none'; // Hide loader

                if (!response.ok) {
                    const errorData = await response.json().catch(() => ({ detail: "Unknown error" }));
                    answerDiv.textContent = `Error: ${response.status} ${response.statusText}`;
                    stepsDiv.textContent = `Details: ${errorData.detail || JSON.stringify(errorData)}`;
                    return;
                }

                const data = await response.json();
                answerDiv.textContent = data.answer;
                
                if (data.steps && Array.isArray(data.steps)) {
                    stepsDiv.textContent = data.steps.join('\n');
                } else {
                    stepsDiv.textContent = "No steps provided or steps are in an unexpected format.";
                }

            } catch (error) {
                loader.style.display = 'none'; // Hide loader
                console.error('Error invoking agent:', error);
                answerDiv.textContent = 'Failed to connect to the agent. See console for details.';
                stepsDiv.textContent = error.toString();
            }
        }
    </script>
</body>
</html>
